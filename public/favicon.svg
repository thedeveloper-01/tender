<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Rich gradient background: royal blue to dark navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1329;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle border glow gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>

    <!-- Vibrant orange gradient for the accent underline -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rect background with border -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="5" />

  <!-- Monogram text: CG -->
  <text
    x="64"
    y="76"
    font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="52"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1"
  >CG</text>

  <!-- Elegant accent line beneath the monogram -->
  <line x1="42" y1="92" x2="86" y2="92" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
</svg>
